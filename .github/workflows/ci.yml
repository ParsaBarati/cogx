name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Verify zero dependencies
        shell: bash
        run: |
          deps=$(node -e "const p=require('./package.json');console.log(Object.keys({...(p.dependencies||{}),...(p.peerDependencies||{})}).length)")
          if [ "$deps" -ne 0 ]; then
            echo "::error::cogx must have zero runtime/peer dependencies (found $deps)"
            exit 1
          fi
          echo "✓ zero runtime dependencies"

      - name: Syntax check
        run: node --check index.js

      - name: Run tests
        run: node test.js

      - name: Help renders
        run: node index.js --help

      - name: Verify pack contents
        shell: bash
        run: |
          npm pack --dry-run 2>&1 | tee pack.txt
          for f in index.js README.md LICENSE package.json; do
            grep -q " $f$" pack.txt || { echo "::error::$f missing from pack"; exit 1; }
          done
          echo "✓ pack contents look right"
